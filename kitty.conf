# font_family      MonacoLigaturized Nerd Font Mono 18
# font_family      Fira Code SemiBold 17
# font_family      Iosevka Term SemiBold 17
# font_family      Iosevka Term Semibold
# font_family      Lilex Bold
# BEGIN_KITTY_FONTS
font_family      Iosevka Term Semibold
font_size        16
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS

modify_font underline_position +2
modify_font underline_thickness 7%

hide_window_decorations titlebar-only
allow_remote_control yes
shell_integration no-title no-cursor

url_style        dotted
confirm_os_window_close 0

# background_blur 100
# background_opacity 0.87

cursor_blink_interval 0
cursor_shape block
cursor_trail 3
cursor_trail_start_threshold 20

editor /opt/homebrew/bin/nvim
macos_quit_when_last_window_closed yes

# BEGIN_KITTY_THEME
# include melange.conf
include ./themes/gruvbox-dark-hard.conf
# include ./themes/cyberdream.conf
# END_KITTY_THEME

map kitty_mod+u no_op
map cmd+r no_op 
map cmd+k no_op 
map cmd+n no_op
map cmd+1 no_op
map cmd+h no_op
map cmd+m no_op
map cmd+opt+s no_op
map opt+cmd+h no_op
map cmd+ctrl+l no_op
